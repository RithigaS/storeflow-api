spring:
  application:
    name: storeflow-api

  datasource:
    url: jdbc:postgresql://localhost:5432/storeflow_db
    username: postgres
    password: rithi
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  web:
    resources:
      add-mappings: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  error:
    include-message: always

app:
  jwt:
    secret: MyVerySecretJwtKeyForStoreFlowProject123456789
    access-expiration: 3600000
    refresh-expiration: 604800000

  file:
    upload-dir: uploads
    product-image-dir: products
    avatar-dir: avatars