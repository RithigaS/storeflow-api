spring:
  application:
    name: storeflow-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/storeflow_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:rithi}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  web:
    resources:
      add-mappings: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enabled: ${SPRING_MAIL_SMTP_STARTTLS_ENABLED:false}

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

server:
  port: ${PORT:8080}
  error:
    include-message: always
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/plain,text/xml,text/csv

spring.lifecycle:
  timeout-per-shutdown-phase: 20s

info:
  app:
    name: StoreFlow API
    description: StoreFlow backend service
    version: 0.0.1-SNAPSHOT

app:
  jwt:
    secret: ${APP_JWT_SECRET:MyVerySecretJwtKeyForStoreFlowProject123456789}
    access-expiration: 3600000
    refresh-expiration: 604800000

  file:
    upload-dir: uploads
    product-image-dir: products
    avatar-dir: avatars

  mail:
    from: ${APP_MAIL_FROM:no-reply@storeflow.local}
    frontend-base-url: ${APP_MAIL_FRONTEND_BASE_URL:http://localhost:3000}
    admin-recipients: ${APP_MAIL_ADMIN_RECIPIENTS:admin@storeflow.local}

  stock:
    low-threshold: 5

  logging:
    trace-id-header: X-Trace-Id

  digest:
    enabled: true

  actuator:
    protected: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}] %-5level %logger{36} - %msg%n"