spring:
  application:
    name: storeflow-api

  datasource:
    url: jdbc:postgresql://localhost:5432/storeflow_db
    username: postgres
    password: rithi
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true



  web:
    resources:
      add-mappings: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  error:
    include-message: always